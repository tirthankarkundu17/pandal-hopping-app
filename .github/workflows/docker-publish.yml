name: Full-Stack CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, labeled]

jobs:
  # ─── Quality Gates ────────────────────────────────────────────────────────
  validate-backend:
    name: Validate Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Run Backend Tests
        run: make test

  # ─── Continuous Deployment ────────────────────────────────────────────────
  publish-docker:
    name: Build & Push Multi-Arch Image
    # Trigger on push to main, OR on PR if it has the 'build' label
    # Must wait for backend validation to pass first
    needs: [validate-backend]
    if: >-
      github.event_name == 'push' || 
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'build'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push using Makefile
        run: make build
        env:
          DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}
